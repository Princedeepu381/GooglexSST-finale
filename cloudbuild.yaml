# Google Cloud Build configuration for LexGuard
# Builds and deploys the containerized application to Google Cloud Run
# via Google Artifact Registry.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_SERVICE_NAME=lexguard
#
# Prerequisites:
#   - Google Cloud project with billing enabled
#   - Cloud Build API enabled
#   - Cloud Run API enabled
#   - Artifact Registry API enabled

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: lexguard
  _REPO_NAME: lexguard-repo

steps:
  # Step 1: Create Artifact Registry repository (if not exists)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud artifacts repositories create ${_REPO_NAME} \
          --repository-format=docker \
          --location=${_REGION} \
          --description="LexGuard container images" \
          --quiet || true

  # Step 2: Build Docker image using Google Cloud Build
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest",
        ".",
      ]

  # Step 3: Push image to Google Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA",
      ]

  # Step 4: Push latest tag to Google Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest",
      ]

  # Step 5: Deploy to Google Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--port=8080"
      - "--set-env-vars=NODE_ENV=production"

# Store built images in Google Artifact Registry
images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest"

# Build timeout
timeout: "1200s"

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
